name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
# Labels follow Conventional Commits. Canonical list:
#   feat, fix, docs, chore, test, ci, perf, a11y, refactor
# Plus: bug (synonym for fix), enhancement (larger feat), dependencies.
categories:
  - title: 'New Features'
    labels:
      - 'feat'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'fix'
      - 'bug'
  - title: 'Documentation'
    labels:
      - 'docs'
  - title: 'Maintenance'
    labels:
      - 'chore'
      - 'ci'
      - 'dependencies'
  - title: 'Testing'
    labels:
      - 'test'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  minor:
    labels:
      - 'feat'
      - 'enhancement'
  patch:
    labels:
      - 'fix'
      - 'bug'
      - 'docs'
      - 'chore'
      - 'ci'
      - 'test'
  default: patch
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
