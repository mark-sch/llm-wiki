# docker-compose.yml — the canonical "run llmwiki in a container" setup.
#
# Two modes:
#   • Pull published image (recommended):
#       docker compose pull && docker compose up -d
#   • Build locally (for development / custom changes):
#       docker compose -f docker-compose.yml -f docker-compose.build.yml up
#
# See docs/deploy/docker.md for the full walk-through.

services:
  llmwiki:
    image: ghcr.io/pratiyush/llm-wiki:latest
    # Fall back to local build if the image isn't available (e.g. before
    # v1.1.0 publishes to ghcr for the first time).
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llmwiki
    ports:
      - "8765:8765"
    volumes:
      # Bind-mount the repo's user-data dirs so llmwiki reads/writes them
      # on the host instead of inside the container.
      - ./raw:/wiki/raw
      - ./wiki:/wiki/wiki
      - ./site:/wiki/site
      - ./examples:/wiki/examples:ro
    # Default command: serve the pre-built site on 0.0.0.0:8765.
    # Override at runtime:
    #   docker compose run --rm llmwiki build
    #   docker compose run --rm llmwiki sync
    #   docker compose run --rm llmwiki lint --fail-on-errors
    command: ["serve", "--host", "0.0.0.0", "--port", "8765", "--dir", "site"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
